  - name: NoDesk
    public_data_patterns: [https://nodesk.co/remote-jobs/index.xml]
    focus: remote
  - name: Arbeitnow
    public_data_patterns: [https://www.arbeitnow.com/api/job-board-api]
    focus: EU/DACH
  - name: Glints
    board_patterns: [https://glints.com/opportunities/jobs]
    public_data_patterns: [public GraphQL job-search endpoint; verify at runtime]
    focus: Southeast Asia
  - name: JobStreet / SEEK
    board_patterns: [https://www.jobstreet.com.sg, https://www.seek.com.au]
    public_data_patterns: [public SEEK chalice-search JSON API; verify at runtime]
    focus: SEA/ANZ
  - name: The Hub
    public_data_patterns: [https://thehub.io/api/jobs]
    focus: Nordic/EU startups
  - name: Landing.jobs
    public_data_patterns: [https://landing.jobs/api/v1/jobs]
    focus: tech, Europe
  - name: 4 Day Week
    public_data_patterns: ["https://4dayweek.io/api/jobs (paginate ?page=N)"]
    focus: 4-day-week employers
  - name: HN Who's Hiring
    public_data_patterns: ["https://hnrss.org/whoishiring/jobs (monthly Ask HN: Who is hiring? thread)"]
    focus: startups, global
  - name: Y Combinator / Work at a Startup
    board_patterns: [https://www.ycombinator.com/jobs, https://www.workatastartup.com]
    focus: YC portfolio
  - name: Wellfound (AngelList Talent)
    board_patterns: [https://wellfound.com]
    focus: startups; largely login-gated — treat strictly as existence signal
  - name: VC portfolio job boards
    board_patterns: ["https://jobs.<vc-domain> (Getro/Consider-powered; e.g. a16z, Sequoia, Lightspeed portfolio boards)"]
    focus: funded startups by investor

# Reusable web-discovery query shapes (Source matrix level 3). Instantiate with
# the thesis's role families, locations, and title synonyms; log results_seen
# per query.
discovery_query_catalog:
  - 'site:<ats-domain> "<role family>" "<location or remote>"'
  - 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "<title A>" OR "<title B>" <location>'
  - 'site:jobs.ashbyhq.com OR site:jobs.lever.co "<title A>" OR "<title B>" <location>'
  - '"<title A>" OR "<title B>" OR "<title C>" site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
  - '"<company>" careers "<role family>" <location>'
  - '"<role family>" jobs <location> site:<regional or niche board>'

# Signals that a captured posting is closed/stale — check before persisting and
# during refresh; set posting_status accordingly and log the signal.
posting_expiry_signals:
  - 'final URL contains "?error=true" (Greenhouse closed-posting redirect)'
  - 'page text: "job no longer available" / "no longer open" / "position has been filled" / "this job has expired" / "page not found"'
  - JD body under ~300 characters after render (shell page)
  - apply button absent or disabled on an otherwise live board
  - 'reposting: same company+title reappearing after a logged expiry — note it in research-log (evergreen-posting signal, affects priority not legitimacy by itself)'

