# RoleScout search source registry.
#
# Purpose:
#   Seed company-universe and source-plan creation with maintained, auditable
#   starting points. The agent must still verify every URL at runtime before
#   relying on it; a stale URL is a discovery seed, not evidence of absence.
#
# Format note:
#   This file is intentionally plain YAML for human editing. The current runtime
#   does not parse it deterministically; job-opening-research agents read it as a
#   reference document while building targets/company-universe.json and
#   targets/source-plan.json.

version: 2
url_policy: verify_at_runtime_before_relying
# Coverage note (v2): ATS families and board feeds below match the breadth of
# widely used open recruiting stacks (career-ops-class coverage). Patterns are
# discovery seeds; always verify per tenant at runtime.
branded_url_rule: >
  When a company has both a branded careers page and a raw ATS board, prefer the
  branded page as source_url and for liveness checks; raw ATS URLs can return
  false 410/closed states (job-ID mismatch) when a branded page exists.

ats_platforms:
  - name: Greenhouse
    board_patterns:
      - https://boards.greenhouse.io/<token>
      - https://job-boards.greenhouse.io/<token>
      - https://job-boards.eu.greenhouse.io/<token>
    public_data_patterns:
      - https://boards-api.greenhouse.io/v1/boards/<token>/jobs
    liveness_notes:
      - redirect to a URL containing "?error=true" means the posting is closed
    discovery_queries:
      - site:boards.greenhouse.io "<company>"
      - site:job-boards.greenhouse.io "<company>"
      - site:job-boards.eu.greenhouse.io "<company>"
  - name: Lever
    board_patterns:
      - https://jobs.lever.co/<token>
    public_data_patterns:
      - https://api.lever.co/v0/postings/<token>?mode=json
    discovery_queries:
      - site:jobs.lever.co "<company>"
  - name: Ashby
    board_patterns:
      - https://jobs.ashbyhq.com/<org>
    public_data_patterns:
      - https://api.ashbyhq.com/posting-api/job-board/<org>
      - https://jobs.ashbyhq.com/api/non-user-graphql?op=ApiJobBoardWithTeams (POST, organizationHostedJobsPageName=<org>)
    discovery_queries:
      - site:jobs.ashbyhq.com "<company>"
  - name: Workable
    board_patterns:
      - https://apply.workable.com/<account>
    public_data_patterns:
      - https://apply.workable.com/api/v1/widget/accounts/<account> (verify per account)
      - public Workable account/job pages when visible; verify per account
    discovery_queries:
      - site:apply.workable.com "<company>"
      - site:jobs.workable.com "<company>"
  - name: SmartRecruiters
    board_patterns:
      - https://careers.smartrecruiters.com/<Company>
    public_data_patterns:
      - https://api.smartrecruiters.com/v1/companies/<Company>/postings
    discovery_queries:
      - site:careers.smartrecruiters.com "<company>"
  - name: Workday
    board_patterns:
      - https://<company>.wd<N>.myworkdayjobs.com/<site>
    public_data_patterns:
      - 'https://<company>.wd<N>.myworkdayjobs.com/wday/cxs/<company>/<site>/jobs (POST {"appliedFacets":{},"limit":20,"offset":0,"searchText":""}; paginate by offset)'
      - search-indexed posting pages and direct job-ID URLs
    discovery_queries:
      - site:myworkdayjobs.com "<company>" "<location>"
  - name: Recruitee
    board_patterns:
      - https://<tenant>.recruitee.com
    public_data_patterns:
      - https://<tenant>.recruitee.com/api/offers/
    discovery_queries:
      - site:recruitee.com "<company>"
  - name: Teamtailor
    board_patterns:
      - https://<tenant>.teamtailor.com/jobs
    public_data_patterns:
      - https://<tenant>.teamtailor.com/jobs.rss (zero-auth per-tenant feed; location in tt: tags, remoteStatus for remote)
    discovery_queries:
      - site:teamtailor.com "<company>" jobs
  - name: Personio
    board_patterns:
      - https://<tenant>.jobs.personio.de
      - https://<tenant>.jobs.personio.com
    public_data_patterns:
      - https://<tenant>.jobs.personio.de/xml (public XML jobs feed; verify per tenant)
    discovery_queries:
      - site:jobs.personio.de "<company>"
  - name: BambooHR
    board_patterns:
      - https://<tenant>.bamboohr.com/careers
    public_data_patterns:
      - https://<tenant>.bamboohr.com/careers/list
      - https://<tenant>.bamboohr.com/careers/<id>/detail
    discovery_queries:
      - site:bamboohr.com "<company>" careers
  - name: Breezy HR
    board_patterns:
      - https://<tenant>.breezy.hr
    public_data_patterns:
      - https://<tenant>.breezy.hr/json (public position feed; verify per tenant)
    discovery_queries:
      - site:breezy.hr "<company>"
  - name: Pinpoint
    board_patterns:
      - https://<tenant>.pinpointhq.com
    public_data_patterns:
      - https://<tenant>.pinpointhq.com/postings.json (zero-auth per-tenant feed)
    discovery_queries:
      - site:pinpointhq.com "<company>"
  - name: Rippling
    board_patterns:
      - https://ats.rippling.com/<slug>/jobs
    public_data_patterns:
      - https://api.rippling.com/platform/api/ats/v1/board/<slug>/jobs
    discovery_queries:
      - site:ats.rippling.com "<company>"
  - name: iCIMS / JibeApply
    board_patterns:
      - https://<slug>.jibeapply.com/jobs
      - branded iCIMS-hosted careers sites at their own /jobs path
    public_data_patterns:
      - https://<slug>.jibeapply.com/api/jobs?page=<N> (rewrite /jobs to /api/jobs; paginate)
    discovery_queries:
      - site:jibeapply.com "<company>"
      - site:icims.com "<company>" jobs
  - name: Jobvite
    board_patterns:
      - https://jobs.jobvite.com/<company>
    public_data_patterns:
      - none confirmed; enumerate the hosted board page
    discovery_queries:
      - site:jobs.jobvite.com "<company>"
  - name: SuccessFactors
    board_patterns:
      - https://careers.<company-domain> (SuccessFactors-hosted; also career<N>.successfactors.com/portal tenants)
    public_data_patterns:
      - none confirmed; JS-heavy — use search-indexed posting pages and direct job-ID URLs
    discovery_queries:
      - site:successfactors.com "<company>" career
  - name: Comeet
    board_patterns:
      - https://www.comeet.com/jobs/<company>/<uid>
    public_data_patterns:
      - per-tenant API URL cannot be derived from the branded page; capture the full URL when found
    discovery_queries:
      - site:comeet.com/jobs "<company>"

# Aggregator boards and public feeds — DISCOVERY signal, not source of record.
# ============================================================================
# Large self-hosted / bespoke careers sites (NOT a third-party ATS).
# These companies do NOT publish a Greenhouse/Lever/Ashby/Workday board, so
# treating "no structured ATS feed" as a failure silently drops them (the exact
# self-hosted-careers seed miss). Handle them as a FIRST-CLASS source, co-equal with ATS:
# hit the careers search endpoint (JSON API when one exists, else the server- or
# JS-rendered listing), collect each posting's OWN official URL, then fetch that
# URL and parse the JD there. verify_at_runtime — patterns/API paths drift.
# ============================================================================
self_hosted_careers:
  capture_contract: >
    For a company here: (1) enumerate/search the careers endpoint for the target
    location(s); (2) collect each posting's official URL (posting_url pattern);
    (3) fetch each posting URL and parse title/location/seniority/must-haves/JD,
    snapshotting to targets/jobs/<job_id>.json. render:json_api and render:server_html
    need NO browser; render:js means the listing/detail is JS-rendered — use a
    browser runtime (Chrome DevTools or Playwright; install Playwright if neither is
    present). A seed here is only loggable as failed/absent after the JSON/API read
    AND a web-discovery pass for direct posting URLs both come up empty.
  companies:
    - name: Google
      render: server_html            # server-rendered list + detail — NO browser needed (verified)
      careers_search_url: https://www.google.com/about/careers/applications/jobs/results/
      search_params: "?q=<keywords>&location=<city>"
      json_api: https://careers.google.com/api/v3/search/?q=<kw>&location=<city>   # optional; the results pages are authoritative
      posting_url: https://www.google.com/about/careers/applications/jobs/results/<id>-<slug>
      notes: "Server-rendered; YouTube / Google Cloud / DeepMind roles live under the same site."
    - name: Meta
      render: js                     # SPA — browser render, or mirror
      careers_search_url: https://www.metacareers.com/jobs/
      posting_url: https://www.metacareers.com/jobs/<id>       # also /profile/job_details/<id>
      mirrors: ["https://metacareers.dejobs.org/", "search-engine indexing of metacareers.com/jobs/<id>"]
      notes: "metacareers is JS-blocked to plain fetch; render with a browser, or capture title/location/family from the dejobs mirror + search excerpts and set posting_status per the live listing."
    - name: Amazon
      render: json_api
      careers_search_url: https://www.amazon.jobs/en/search
      json_api: https://www.amazon.jobs/en/search.json?base_query=<kw>&loc_query=<city>&result_limit=100
      posting_url: https://www.amazon.jobs/en/jobs/<id>
    - name: Apple
      render: json_api
      careers_search_url: https://jobs.apple.com/en-us/search
      json_api: https://jobs.apple.com/api/role/search   # POST: {query, filters:{locations}}
      posting_url: https://jobs.apple.com/en-us/details/<id>
    - name: Microsoft
      render: json_api
      careers_search_url: https://jobs.careers.microsoft.com/global/en/search
      json_api: https://gcsservices.careers.microsoft.com/search/api/v1/search?q=<kw>&lc=<city>&pg=1&pgSz=100
      posting_url: https://jobs.careers.microsoft.com/global/en/job/<id>
    - name: Netflix
      render: json_api               # Eightfold (verified)
      careers_search_url: https://explore.jobs.netflix.net/careers
      json_api: https://explore.jobs.netflix.net/api/apply/v2/jobs?domain=netflix.com&query=<kw>&location=<city>
      posting_url: https://explore.jobs.netflix.net/careers/job/<id>   # JD via /api/apply/v2/jobs/<id>?domain=netflix.com
    - name: Uber
      render: json_api
      careers_search_url: https://www.uber.com/us/en/careers/list/
      json_api: https://www.uber.com/api/loadSearchJobsResults   # POST: {params:{location, query}}
      posting_url: https://www.uber.com/careers/list/<id>
    - name: Airbnb
      render: json_api               # branded site is Greenhouse-backed
      careers_search_url: https://careers.airbnb.com/positions/
      json_api: https://boards-api.greenhouse.io/v1/boards/airbnb/jobs   # standard Greenhouse feed (token 'airbnb')
      posting_url: https://careers.airbnb.com/positions/<id>
      notes: "The Greenhouse ATS feed works; capture the branded careers.airbnb.com URL as source_url."
    - name: LinkedIn
      render: js                     # login-gated for full JD
      careers_search_url: https://www.linkedin.com/company/linkedin/jobs/
      posting_url: https://www.linkedin.com/jobs/view/<jobId>
      notes: "LinkedIn (Microsoft) posts on LinkedIn itself — covered by the mandatory LinkedIn Jobs pass under the login-handoff contract; never log in from the agent."
    - name: TikTok / ByteDance
      render: js
      careers_search_url: https://lifeattiktok.com/search
      json_api: https://lifeattiktok.com/api/v1/search/job/posts   # POST: {keyword, location_code_list}
      posting_url: https://lifeattiktok.com/search/<id>
      notes: "JS-heavy; use the JSON API when reachable, else render with a browser."
    - name: Electronic Arts
      render: server_html            # Avature (verified)
      careers_search_url: https://jobs.ea.com/en_US/careers/SearchJobs/<keyword>   # keyword in the PATH; ?keywords= is ignored
      posting_url: https://jobs.ea.com/en_US/careers/JobDetail/<slug>/<id>
  also_standard_ats: >
    Many large employers DO use a standard ATS already covered by ats_platforms —
    handle them there, not here (try the ATS token first): Workday (NVIDIA,
    Salesforce, Adobe, and any *.myworkdayjobs.com host), Greenhouse (Stripe,
    Airbnb, Databricks, Coinbase, Figma), Ashby (OpenAI, Ramp, Notion, Linear),
    Lever, SmartRecruiters (Grab, Visa), iCIMS / Taleo / SuccessFactors (older
    enterprises). Only fall to this bespoke-careers path when no ATS token resolves.

# Rule: discover here, then verify and capture the JD at the company/ATS source
# whenever one exists. Empty/stale feed results are coverage signals, never
# evidence of absence.
job_boards_and_aggregators:
