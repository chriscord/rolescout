name: ci

on:
  push:
  pull_request:

jobs:
  release-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/release_check.py

  installer-smoke:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            installer: tools/install-linux.sh
          - os: macos-latest
            installer: tools/install-macos.sh
          - os: windows-latest
            installer: tools/install-windows.ps1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Unix installer through its documented pipe entrypoint
        if: runner.os != 'Windows'
        shell: bash
        env:
          ROLENAVI_REPO_URL: ${{ github.workspace }}
        run: |
          test -x "${{ matrix.installer }}"
          install_parent="$RUNNER_TEMP/rolenavi-installer-smoke-parent"
          mkdir -p "$install_parent"
          cd "$install_parent"
          bash < "$GITHUB_WORKSPACE/${{ matrix.installer }}"
          test -x "$install_parent/rolenavi/start"
          "$install_parent/rolenavi/start" --version
          "$install_parent/rolenavi/start" doctor
          bash < "$GITHUB_WORKSPACE/${{ matrix.installer }}"
      - name: Run Windows installer through its documented pipe entrypoint
        if: runner.os == 'Windows'
        shell: powershell
        env:
          ROLENAVI_REPO_URL: ${{ github.workspace }}
        run: |
          $installer = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.installer }}"
          $installParent = Join-Path $env:RUNNER_TEMP 'rolenavi-installer-smoke-parent'
          New-Item -ItemType Directory -Force -Path $installParent | Out-Null
          Set-Location -LiteralPath $installParent
          Get-Content -Raw -LiteralPath $installer | Invoke-Expression
          $installDir = Join-Path $installParent 'rolenavi'
          & (Join-Path $installDir 'start.cmd') --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & (Join-Path $installDir 'start.cmd') doctor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content -Raw -LiteralPath $installer | Invoke-Expression
