name: ci

on:
  push:
  pull_request:

jobs:
  release-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/release_check.py

  installer-smoke:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            installer: tools/install-linux.sh
          - os: macos-latest
            installer: tools/install-macos.sh
          - os: windows-latest
            installer: tools/install-windows.ps1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Unix installer through its documented pipe entrypoint
        if: runner.os != 'Windows'
        shell: bash
        env:
          ROLENAVI_REPO_URL: ${{ github.workspace }}
          ROLENAVI_INSTALL_DIR: ${{ runner.temp }}/rolenavi-installer-smoke
        run: |
          test -x "${{ matrix.installer }}"
          bash < "$GITHUB_WORKSPACE/${{ matrix.installer }}"
          cd "$ROLENAVI_INSTALL_DIR"
          "$ROLENAVI_INSTALL_DIR/.venv/bin/rolenavi" --version
          "$ROLENAVI_INSTALL_DIR/.venv/bin/rolenavi" doctor
          bash < "$GITHUB_WORKSPACE/${{ matrix.installer }}"
      - name: Run Windows installer through its documented pipe entrypoint
        if: runner.os == 'Windows'
        shell: powershell
        env:
          ROLENAVI_REPO_URL: ${{ github.workspace }}
          ROLENAVI_INSTALL_DIR: ${{ runner.temp }}\rolenavi-installer-smoke
        run: |
          $installer = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.installer }}"
          Get-Content -Raw -LiteralPath $installer | Invoke-Expression
          Set-Location -LiteralPath $env:ROLENAVI_INSTALL_DIR
          & (Join-Path $env:ROLENAVI_INSTALL_DIR '.venv\Scripts\rolenavi.exe') --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & (Join-Path $env:ROLENAVI_INSTALL_DIR '.venv\Scripts\rolenavi.exe') doctor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content -Raw -LiteralPath $installer | Invoke-Expression
